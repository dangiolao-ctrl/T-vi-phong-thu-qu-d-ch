<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phong Thủy Việt Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>☯️ PHONG THỦY VIỆT PRO</h1>

<p>Tử Vi • Ngũ Hành • Bát Trạch • Can Chi</p>

<div id="dongho">
Đang tải...
</div>

</div>

<div class="card">

<div class="card-title">
🔮 Thông Tin Cá Nhân
</div>

<label>Họ và tên</label>
<input
type="text"
id="hoten"
placeholder="Nhập họ và tên">

<label>Giới tính</label>
<select id="gioitinh">
<option>Nam</option>
<option>Nữ</option>
</select>

<label>Ngày sinh dương lịch</label>
<input
type="date"
id="ngaysinh">

<label>Giờ sinh</label>
<select id="giosinh">

<option>Tý</option>
<option>Sửu</option>
<option>Dần</option>
<option>Mão</option>
<option>Thìn</option>
<option>Tỵ</option>
<option>Ngọ</option>
<option>Mùi</option>
<option>Thân</option>
<option>Dậu</option>
<option>Tuất</option>
<option>Hợi</option>

</select>

<button onclick="xemCanChi()">
XEM TỬ VI
</button>

</div>

<div class="card" id="ketqua">

<div class="card-title">
📜 Kết Quả
</div>

Chưa có dữ liệu

</div>

</div>

<script src="js/data.js"></script>
<script src="js/tuvi.js"></script>
<script src="js/app.js"></script>

</body>
</html>
