<div class="box">

<h2>🔮 TỬ VI PHONG THỦY</h2>

<input type="text" id="hoten" placeholder="Họ và tên">

<select id="gioitinh">
<option value="nam">Nam</option>
<option value="nu">Nữ</option>
</select>

<input type="date" id="ngaysinh">

<select id="giosinh">
<option value="Tý">Tý (23h-01h)</option>
<option value="Sửu">Sửu (01h-03h)</option>
<option value="Dần">Dần (03h-05h)</option>
<option value="Mão">Mão (05h-07h)</option>
<option value="Thìn">Thìn (07h-09h)</option>
<option value="Tỵ">Tỵ (09h-11h)</option>
<option value="Ngọ">Ngọ (11h-13h)</option>
<option value="Mùi">Mùi (13h-15h)</option>
<option value="Thân">Thân (15h-17h)</option>
<option value="Dậu">Dậu (17h-19h)</option>
<option value="Tuất">Tuất (19h-21h)</option>
<option value="Hợi">Hợi (21h-23h)</option>
</select>

<button onclick="xemTuVi()">Xem Tử Vi</button>

<div id="ketquatuvi"></div>

</div>

<script>

function xemTuVi(){

let ten=document.getElementById("hoten").value;
let gt=document.getElementById("gioitinh").value;
let ns=document.getElementById("ngaysinh").value;
let gio=document.getElementById("giosinh").value;

if(!ns){
alert("Chọn ngày sinh");
return;
}

let nam=parseInt(ns.split("-")[0]);

const can=[
"Canh","Tân","Nhâm","Quý",
"Giáp","Ất","Bính","Đinh",
"Mậu","Kỷ"
];

const chi=[
"Thân","Dậu","Tuất","Hợi",
"Tý","Sửu","Dần","Mão",
"Thìn","Tỵ","Ngọ","Mùi"
];

let canchi=
can[nam%10]+" "+chi[nam%12];

let hanh="";

if(
canchi.includes("Kim")
){
hanh="Kim";
}
else{

const nguhanh=[
"Kim","Kim",
"Thủy","Thủy",
"Mộc","Mộc",
"Hỏa","Hỏa",
"Thổ","Thổ"
];

hanh=nguhanh[nam%10];
}

let cung="";

if(gt=="nam"){

const cungNam=[
"Khảm","Ly","Cấn",
"Đoài","Càn",
"Khôn","Tốn",
"Chấn","Khôn"
];

cung=cungNam[nam%9];

}else{

const cungNu=[
"Cấn","Càn","Đoài",
"Cấn","Ly",
"Khảm","Khôn",
"Chấn","Tốn"
];

cung=cungNu[nam%9];

}

let somayman=
(
nam+
gio.charCodeAt(0)
)%99+1;

document.getElementById("ketquatuvi").innerHTML=`

<h3>${ten}</h3>

<p><b>Ngày sinh dương:</b> ${ns}</p>

<p><b>Giờ sinh:</b> ${gio}</p>

<p><b>Can Chi:</b> ${canchi}</p>

<p><b>Ngũ Hành:</b> ${hanh}</p>

<p><b>Cung Mệnh:</b> ${cung}</p>

<p><b>Số May Mắn:</b> ${somayman}</p>

`;

}

</script>
